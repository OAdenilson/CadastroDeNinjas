<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Adicionar Ninja</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}"/>
    <style>
        /* RESET & BASE */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #2a2a40);
            color: #fff;
            padding: 40px;
        }

        /* TITLE */
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5rem;
            color: #00f5d4;
        }

        /* CONTAINER */
        .form-container {
            max-width: 600px;
            margin: auto;
            background: #2f2f4f;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        /* MENSAGEM */
        .mensagem {
            background: linear-gradient(45deg, #00f5d4, #0bbcd6);
            color: #1e1e2f;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: bold;
        }

        /* FORM */
        form {
            display: flex;
            flex-direction: column;
        }

        /* LABEL */
        label {
            margin-top: 15px;
            margin-bottom: 5px;
            font-weight: bold;
            color: #ffbe0b;
        }

        /* INPUT */
        input {
            padding: 10px;
            border-radius: 8px;
            border: none;
            outline: none;
            background: #3a3a5a;
            color: #fff;
            transition: all 0.3s ease;
        }

        input:focus {
            box-shadow: 0 0 10px #00f5d4;
            transform: scale(1.02);
        }

        /* BUTTON */
        button {
            margin-top: 20px;
            padding: 12px;
            background: linear-gradient(45deg, #ff006e, #ffbe0b);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 8px 20px rgba(255, 0, 110, 0.6);
        }

        /* BACK LINK */
        a {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            padding: 10px 15px;
            border-radius: 10px;
            background: linear-gradient(45deg, #8338ec, #3a86ff);
            color: #fff;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        a:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(131, 56, 236, 0.6);
        }
    </style>
</head>
<body>
<h1>Adicionar Novo Ninja</h1>
<div class="form-container">
    <div th:if="${mensagem}" class="mensagem" th:text="${mensagem}"></div>
    <form th:action="@{/ninjas/ui/salvar}" th:object="${ninja}" method="post">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" th:field="*{nome}" required/>

        <label for="email">Email:</label>
        <input type="email" id="email" th:field="*{email}" required/>

        <label for="imgUrl">URL da Imagem:</label>
        <input type="text" id="imgUrl" th:field="*{imgUrl}" required/>

        <label for="idade">Idade:</label>
        <input type="number" id="idade" th:field="*{idade}" required/>

        <label for="rank">Rank:</label>
        <input type="text" id="rank" th:field="*{rank}"/>

        <button type="submit">Cadastrar Ninja</button>
    </form>
    <a th:href="@{/ninjas/ui/listar}">Voltar para a lista de ninjas</a>
</div>
</body>
</html>
