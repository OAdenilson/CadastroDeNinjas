<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Detalhes do Ninja</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
    <style>
        /* RESET & BASE */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #2a2a40);
            color: #fff;
            padding: 40px;
        }

        /* TITLE */
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5rem;
            color: #00f5d4;
        }

        /* CONTAINER */
        div {
            max-width: 800px;
            margin: auto;
            background: #2f2f4f;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        /* IMAGE */
        div img {
            border-radius: 15px;
            margin-bottom: 20px;
            transition: transform 0.3s ease;
        }

        div img:hover {
            transform: scale(1.05);
        }

        /* NAME */
        h2 {
            margin-bottom: 15px;
            color: #ffbe0b;
        }

        /* TEXT */
        p {
            margin: 8px 0;
            font-size: 1rem;
        }

        strong {
            color: #00f5d4;
        }

        /* SUBTITLE */
        h3 {
            margin-top: 25px;
            margin-bottom: 10px;
            color: #ff006e;
        }

        /* TABLE */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            background: #3a3a5a;
            border-radius: 10px;
            overflow: hidden;
        }

        /* HEADER */
        thead {
            background: linear-gradient(45deg, #00f5d4, #0bbcd6);
        }

        thead th {
            padding: 10px;
            color: #1e1e2f;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        /* BODY */
        tbody tr {
            transition: 0.2s ease;
        }

        tbody tr:hover {
            background: #4a4a7a;
        }

        /* CELLS */
        td {
            padding: 10px;
            font-size: 0.9rem;
        }

        /* BACK BUTTON */
        a {
            display: inline-block;
            margin-top: 25px;
            padding: 10px 18px;
            background: linear-gradient(45deg, #8338ec, #3a86ff);
            color: #fff;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        a:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(131, 56, 236, 0.6);
        }

    </style>
</head>
<body>
<h1>Detalhes do Ninja</h1>
<div>
    <img th:src="${ninja.imgUrl}" alt="${ninja.nome}" width="200" />
    <h2 th:text="${ninja.nome}"></h2>
    <p><strong>Email:</strong> <span th:text="${ninja.email}"></span></p>
    <p><strong>Idade:</strong> <span th:text="${ninja.idade}"></span></p>
    <p><strong>Rank:</strong> <span th:text="${ninja.rank}"></span></p>

    <h3>Missões:</h3>
    <table>
        <thead>
        <tr>
            <th>Nome</th>
            <th>Dificuldade</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="missao : ${ninja.missoes}">
            <td th:text="${missao.nome}"></td>
            <td th:text="${missao.dificuldade}"></td>
        </tr>
        </tbody>
    </table>
</div>
<a href="/ninjas/ui/listar">Voltar para a lista de ninjas</a>
</body>
</html>
